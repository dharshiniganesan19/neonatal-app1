<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neonatal Prediction</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #0072ff;
            box-shadow: 0 0 5px rgba(0,114,255,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ff6a00, #ee0979);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #ee0979, #ff6a00);
        }

        .result {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>👶 Neonatal Prediction</h2>

    <form method="POST">

        <input type="number" name="mother_age" placeholder="Mother Age" required>

        <select name="delivery_type">
            <option value="">Select Delivery Type</option>
            <option value="normal">Normal</option>
            <option value="cesarean">Cesarean</option>
        </select>

        <input type="number" name="birth_weight" placeholder="Birth Weight (kg)" required>

        <select name="gender">
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <input type="number" name="gestation_weeks" placeholder="Gestation Weeks" required>

        <input type="number" name="blood_pressure" placeholder="Blood Pressure" required>

        <input type="number" name="heart_rate" placeholder="Heart Rate" required>

        <input type="number" name="temperature" placeholder="Temperature" required>

        <button type="submit">🔍 Predict</button>

    </form>

    {% if result %}
        <div class="result {% if 'Error' in result %}error{% else %}success{% endif %}">
            {{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
